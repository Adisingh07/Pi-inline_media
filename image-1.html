<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Image Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#09090f;
  --surface:#111118;
  --card:#16161f;
  --border:#1f1f2e;
  --accent:#e8c97e;
  --accent2:#c97eb8;
  --text:#ededf5;
  --muted:#52526e;
  --radius:16px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Fraunces',serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px 48px;
  overflow-x:hidden;
}

/* ── Grain overlay ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── Header ── */
.header{
  width:100%;max-width:720px;
  text-align:center;
  margin-bottom:28px;
  position:relative;z-index:1;
  animation:fadeDown .7s ease both;
}
.header h1{
  font-size:clamp(1.6rem,5vw,2.2rem);
  font-weight:300;
  font-style:italic;
  color:var(--text);
  letter-spacing:-.5px;
  line-height:1.1;
}
.header h1 em{
  font-style:normal;
  background:linear-gradient(120deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{
  font-family:'DM Mono',monospace;
  font-size:.66rem;color:var(--muted);
  margin-top:6px;letter-spacing:.05em;
}

/* ── Input area ── */
.input-wrap{
  width:100%;max-width:720px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
  position:relative;z-index:1;
  animation:fadeUp .5s .1s ease both;
}
.input-wrap h2{
  font-family:'DM Mono',monospace;
  font-size:.68rem;font-weight:500;
  text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);margin-bottom:12px;
}
.input-row{display:flex;gap:8px;}
input[type=text]{
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:.74rem;outline:none;
  transition:border-color .2s;
}
input:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}

.btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#0a0a0f;
  border:none;border-radius:10px;
  padding:10px 16px;
  font-family:'DM Mono',monospace;
  font-weight:500;font-size:.78rem;
  cursor:pointer;white-space:nowrap;
  transition:opacity .2s,transform .1s;
  flex-shrink:0;
}
.btn:active{opacity:.85;transform:scale(.97);}
.btn-ghost{
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:.72rem;
  padding:8px 14px;border-radius:10px;
  cursor:pointer;
  transition:border-color .2s,color .2s;
  margin-top:10px;width:100%;
}
.btn-ghost:active{border-color:var(--accent);color:var(--accent);}

/* ── URL queue list ── */
.url-list{
  display:flex;flex-direction:column;gap:5px;
  margin-bottom:10px;
}
.url-item{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;
  font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);
}
.url-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.url-item button{
  background:none;border:none;color:var(--muted);
  font-size:.85rem;cursor:pointer;padding:2px 4px;
  flex-shrink:0;transition:color .15s;
}
.url-item button:active{color:#f87171;}

/* ── Gallery ── */
#gallery{
  width:100%;max-width:720px;
  display:flex;flex-direction:column;
  gap:16px;
  position:relative;z-index:1;
  animation:fadeUp .5s .2s ease both;
}

/* ── Single image card ── */
.img-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.img-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
}
.img-card-label{
  font-family:'DM Mono',monospace;
  font-size:.64rem;color:var(--muted);
  display:flex;align-items:center;gap:7px;min-width:0;
}
.tag{
  background:rgba(232,201,126,.1);
  color:var(--accent);
  border-radius:5px;padding:2px 7px;
  font-size:.6rem;font-weight:500;
  text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;
}
.img-card-label span:last-child{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rm-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);border-radius:6px;
  padding:3px 8px;font-size:.7rem;cursor:pointer;
  transition:color .15s,border-color .15s;flex-shrink:0;
}
.rm-btn:active{color:#f87171;border-color:#f87171;}

.img-body{padding:10px;}
.img-body img{
  width:100%;max-height:300px;
  object-fit:contain;
  border-radius:10px;
  display:block;
  background:var(--bg);
  cursor:zoom-in;
  -webkit-touch-callout:none;
  user-select:none;
  transition:opacity .3s;
}
.img-body img.loading{opacity:.4;}

/* ── Carousel card ── */
.carousel-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.carousel-card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);
}

/* Carousel viewport */
.c-viewport{
  position:relative;
  overflow:hidden;
  background:var(--bg);
  touch-action:pan-y;
}
.c-track{
  display:flex;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.c-slide{
  min-width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:10px;
}
.c-slide img{
  max-width:100%;max-height:300px;
  object-fit:contain;display:block;
  border-radius:10px;background:var(--bg);
  cursor:zoom-in;
  -webkit-touch-callout:none;user-select:none;
  pointer-events:none;
}

/* Count badge */
.c-count{
  position:absolute;top:12px;right:14px;
  background:rgba(0,0,0,.65);
  color:rgba(255,255,255,.85);
  font-family:'DM Mono',monospace;font-size:.62rem;
  padding:3px 9px;border-radius:20px;
  backdrop-filter:blur(8px);pointer-events:none;
  border:1px solid rgba(255,255,255,.08);
}

/* Dots */
.c-dots{
  display:flex;justify-content:center;gap:5px;
  padding:8px 0 4px;
}
.c-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--border);cursor:pointer;
  transition:background .2s,transform .2s,width .2s;
}
.c-dot.active{
  background:var(--accent);
  transform:scale(1.2);
  width:16px;border-radius:99px;
}

/* Arrow buttons */
.c-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;width:34px;height:34px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);
  z-index:3;pointer-events:auto;
  transition:background .15s,opacity .15s;
  font-size:.9rem;
}
.c-arrow:active{background:rgba(0,0,0,.8);}
.c-arrow.left{left:10px;}
.c-arrow.right{right:10px;}

/* ── Lightbox ── */
#lightbox{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.97);
  z-index:9999;
  align-items:center;justify-content:center;
  overflow:hidden;
  animation:lbIn .22s ease;
}
#lightbox.active{display:flex;}
@keyframes lbIn{from{opacity:0}to{opacity:1}}

/* Top bar */
#lb-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
  z-index:3;
  transition:opacity .3s;
}
#lightbox.ui-hidden #lb-bar{opacity:0;pointer-events:none;}

#lb-counter{
  font-family:'DM Mono',monospace;
  font-size:.7rem;color:rgba(255,255,255,.6);
  background:rgba(0,0,0,.5);
  padding:4px 10px;border-radius:20px;
  backdrop-filter:blur(8px);
}
#lb-close{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;width:38px;height:38px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(10px);
  font-size:1.1rem;
  transition:background .15s;
  pointer-events:auto !important;
  z-index:10;
}
#lb-close:active{background:rgba(255,255,255,.22);}

/* Image container */
#lb-wrap{
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;touch-action:none;position:relative;
}
#lb-img{
  max-width:100vw;max-height:100vh;
  object-fit:contain;display:block;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  will-change:transform;
  transform-origin:center center;
  pointer-events:none;
  transition:opacity .2s;
}
#lb-img.fading{opacity:0;}

/* Bottom hint */
#lb-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:.6rem;
  color:rgba(255,255,255,.25);
  pointer-events:none;
  transition:opacity .3s;
  white-space:nowrap;
}
#lightbox.ui-hidden #lb-hint{opacity:0;}

/* ── Empty state ── */
#empty{
  text-align:center;padding:48px 20px;
  color:var(--muted);
  font-family:'DM Mono',monospace;font-size:.72rem;
  border:1px dashed var(--border);border-radius:var(--radius);
  line-height:1.7;
}
#empty .e-icon{font-size:2.4rem;margin-bottom:12px;}

/* ── Animations ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp  {from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <h1>Image <em>Viewer</em></h1>
  <p>Native pinch zoom · swipe carousel · lightbox</p>
</div>

<!-- Single image input -->
<div class="input-wrap">
  <h2>📷 Single Image</h2>
  <div class="input-row">
    <input type="text" id="single-url" placeholder="https://example.com/photo.jpg"/>
    <button class="btn" onclick="addSingle()">Add</button>
  </div>
</div>

<!-- Carousel input -->
<div class="input-wrap">
  <h2>🖼 Multi-Image Carousel</h2>
  <div id="c-url-list" class="url-list"></div>
  <div class="input-row">
    <input type="text" id="carousel-url" placeholder="https://example.com/photo.jpg"/>
    <button class="btn" onclick="pushCarouselUrl()">＋</button>
  </div>
  <button class="btn-ghost" onclick="buildCarousel()">Create Carousel →</button>
</div>

<!-- Gallery output -->
<div id="gallery">
  <div id="empty">
    <div class="e-icon">🌅</div>
    Koi image nahi hai abhi<br/>Upar URL daalo aur add karo
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lb-bar">
    <div id="lb-counter">1 / 1</div>
    <button id="lb-close" onclick="closeLb()">✕</button>
  </div>
  <div id="lb-wrap">
    <img id="lb-img" src="" alt=""/>
  </div>
  <div id="lb-hint">pinch to zoom · swipe to close · double tap to reset</div>
</div>

<script>
// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let carouselUrls = [];

// ═══════════════════════════════
//  UTILS
// ═══════════════════════════════
function clearEmpty(){ const e=document.getElementById('empty'); if(e) e.remove(); }

function removeCard(id){
  const c=document.getElementById(id);
  if(c) c.remove();
  if(!document.getElementById('gallery').children.length){
    document.getElementById('gallery').innerHTML=
      `<div id="empty"><div class="e-icon">🌅</div>Koi image nahi hai abhi<br/>Upar URL daalo aur add karo</div>`;
  }
}

// ═══════════════════════════════
//  SINGLE IMAGE
// ═══════════════════════════════
function addSingle(){
  const inp = document.getElementById('single-url');
  const url = inp.value.trim();
  if(!url) return;
  clearEmpty();
  inp.value='';

  const id = 'card-'+Date.now();
  const card = document.createElement('div');
  card.className='img-card'; card.id=id;
  card.innerHTML=`
    <div class="img-card-header">
      <div class="img-card-label">
        <span class="tag">image</span>
        <span>${url}</span>
      </div>
      <button class="rm-btn" onclick="removeCard('${id}')">✕</button>
    </div>
    <div class="img-body">
      <img src="${url}" alt="" class="loading"
        onload="this.classList.remove('loading')"
        onerror="this.style.opacity='.3';this.alt='⚠ Load failed'"/>
    </div>`;

  // tap to open lightbox
  const img = card.querySelector('img');
  img.addEventListener('click', ()=> openLb([url], 0));

  document.getElementById('gallery').appendChild(card);
}

// ═══════════════════════════════
//  CAROUSEL
// ═══════════════════════════════
function pushCarouselUrl(){
  const inp = document.getElementById('carousel-url');
  const url = inp.value.trim();
  if(!url) return;
  carouselUrls.push(url);
  inp.value='';
  renderUrlList();
}

function removeCarouselUrl(i){
  carouselUrls.splice(i,1);
  renderUrlList();
}

function renderUrlList(){
  const list = document.getElementById('c-url-list');
  list.innerHTML='';
  carouselUrls.forEach((url,i)=>{
    const row=document.createElement('div');
    row.className='url-item';
    row.innerHTML=`<span>${i+1}. ${url}</span>
      <button onclick="removeCarouselUrl(${i})">✕</button>`;
    list.appendChild(row);
  });
}

function buildCarousel(){
  if(!carouselUrls.length) return;
  clearEmpty();
  const urls=[...carouselUrls];
  carouselUrls=[]; renderUrlList();

  const id='card-'+Date.now();
  const card=document.createElement('div');
  card.className='carousel-card'; card.id=id;
  card.innerHTML=`
    <div class="carousel-card-header">
      <div class="img-card-label">
        <span class="tag">carousel</span>
        <span>${urls.length} images</span>
      </div>
      <button class="rm-btn" onclick="removeCard('${id}')">✕</button>
    </div>`;

  const carousel = makeCarousel(urls);
  card.appendChild(carousel);
  document.getElementById('gallery').appendChild(card);
}

function makeCarousel(urls){
  let cur=0;
  let startX=0, diffX=0, swiped=false;

  const wrap=document.createElement('div');
  wrap.className='c-viewport';

  // Count badge
  const badge=document.createElement('div');
  badge.className='c-count';
  badge.textContent=`1 / ${urls.length}`;
  wrap.appendChild(badge);

  // Track + slides
  const track=document.createElement('div');
  track.className='c-track';
  urls.forEach((url,i)=>{
    const slide=document.createElement('div');
    slide.className='c-slide';
    const img=document.createElement('img');
    img.src=url;
    img.loading=i===0?'eager':'lazy';
    img.draggable=false;
    slide.appendChild(img);
    // tap → lightbox (only if not swiped)
    slide.addEventListener('click',()=>{ if(!swiped) openLb(urls, cur); });
    track.appendChild(slide);
  });
  wrap.appendChild(track);

  // Arrows (only if >1)
  if(urls.length>1){
    const la=document.createElement('button');
    la.className='c-arrow left'; la.innerHTML='‹';
    la.addEventListener('click', e=>{ e.stopPropagation(); goTo(cur-1); });
    wrap.appendChild(la);
    const ra=document.createElement('button');
    ra.className='c-arrow right'; ra.innerHTML='›';
    ra.addEventListener('click', e=>{ e.stopPropagation(); goTo(cur+1); });
    wrap.appendChild(ra);
  }

  // Dots
  const dotsWrap=document.createElement('div');
  dotsWrap.className='c-dots';
  const dots=urls.map((_,i)=>{
    const d=document.createElement('div');
    d.className='c-dot'+(i===0?' active':'');
    d.addEventListener('click',()=>goTo(i));
    dotsWrap.appendChild(d);
    return d;
  });
  wrap.appendChild(dotsWrap);

  function goTo(idx){
    cur=Math.max(0,Math.min(idx,urls.length-1));
    track.style.transform=`translateX(-${cur*100}%)`;
    dots.forEach((d,i)=>d.classList.toggle('active',i===cur));
    badge.textContent=`${cur+1} / ${urls.length}`;
  }

  // Touch swipe
  wrap.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;
    diffX=0; swiped=false;
    track.style.transition='none';
  },{passive:true});

  wrap.addEventListener('touchmove',e=>{
    diffX=e.touches[0].clientX-startX;
    const dy=Math.abs(e.touches[0].clientY-(e.touches[0].clientY)); // zero
    if(Math.abs(diffX)>10){
      swiped=true;
      const base=cur*wrap.offsetWidth;
      track.style.transform=`translateX(${-base+diffX}px)`;
    }
  },{passive:true});

  wrap.addEventListener('touchend',()=>{
    track.style.transition='';
    if(Math.abs(diffX)>50){
      if(diffX<0 && cur<urls.length-1) goTo(cur+1);
      else if(diffX>0 && cur>0) goTo(cur-1);
      else goTo(cur);
    } else goTo(cur);
  },{passive:true});

  return wrap;
}

// ═══════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════
const lbEl   = document.getElementById('lightbox');
const lbImg  = document.getElementById('lb-img');
const lbWrap = document.getElementById('lb-wrap');
const lbCtr  = document.getElementById('lb-counter');

let lb = {
  imgs:[], cur:0,
  scale:1, tx:0, ty:0,
  // pinch
  lastDist:null, baseScale:1, baseTx:0, baseTy:0,
  pinchMidX:0, pinchMidY:0,
  // drag/swipe
  dragging:false,
  dragStartX:0, dragStartY:0,
  dragBaseTx:0, dragBaseTy:0,
  swipeLocked:false, // true = pure swipe (no pan)
  // double tap
  lastTap:0,
  // ui
  uiTimer:null
};

function openLb(imgs, startIdx){
  lb.imgs=imgs; lb.cur=startIdx;
  resetLbTransform();
  lbImg.classList.add('fading');
  lbImg.src=imgs[startIdx];
  setTimeout(()=>lbImg.classList.remove('fading'),50);
  lbCtr.textContent=imgs.length>1 ? `${startIdx+1} / ${imgs.length}` : '';
  lbEl.classList.add('active');
  document.body.style.overflow='hidden';
  showLbUi();
}

function closeLb(){
  lbEl.classList.remove('active','ui-hidden');
  clearTimeout(lb.uiTimer);
  setTimeout(()=>{ lbImg.src=''; },250);
  document.body.style.overflow='';
  resetLbTransform();
}

function lbGo(idx){
  if(idx<0||idx>=lb.imgs.length) return;
  lb.cur=idx;
  resetLbTransform();
  lbImg.classList.add('fading');
  setTimeout(()=>{
    lbImg.src=lb.imgs[idx];
    lbImg.classList.remove('fading');
  },130);
  lbCtr.textContent=lb.imgs.length>1 ? `${idx+1} / ${lb.imgs.length}` : '';
}

function resetLbTransform(){
  lb.scale=1; lb.tx=0; lb.ty=0;
  applyLb(false);
}

function applyLb(animated){
  lbImg.style.transition = animated ? 'transform .2s ease' : 'none';
  lbImg.style.transform=`translate(${lb.tx}px,${lb.ty}px) scale(${lb.scale})`;
}

// Clamp pan so image edges can't go past center unless zoomed enough
function clampPan(){
  if(lb.scale<=1){ lb.tx=0; lb.ty=0; return; }
  const iw = lbImg.naturalWidth  || lbImg.offsetWidth;
  const ih = lbImg.naturalHeight || lbImg.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // rendered size
  const rw = Math.min(vw, iw*(vh/ih));
  const rh = Math.min(vh, ih*(vw/iw));
  const scaledW = rw * lb.scale;
  const scaledH = rh * lb.scale;
  const maxTx = Math.max(0,(scaledW - vw)/2);
  const maxTy = Math.max(0,(scaledH - vh)/2);
  lb.tx = Math.max(-maxTx, Math.min(maxTx, lb.tx));
  lb.ty = Math.max(-maxTy, Math.min(maxTy, lb.ty));
}

function showLbUi(){
  lbEl.classList.remove('ui-hidden');
  clearTimeout(lb.uiTimer);
  lb.uiTimer=setTimeout(()=>lbEl.classList.add('ui-hidden'), 3000);
}

// ── Touch gestures ──
lbWrap.addEventListener('touchstart',e=>{
  showLbUi();

  if(e.touches.length===2){
    // PINCH START
    lb.lastDist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    lb.baseScale=lb.scale;
    lb.baseTx=lb.tx; lb.baseTy=lb.ty;
    // mid point of pinch relative to image center
    lb.pinchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2 - window.innerWidth/2;
    lb.pinchMidY=(e.touches[0].clientY+e.touches[1].clientY)/2 - window.innerHeight/2;
    lb.dragging=false;

  } else if(e.touches.length===1){
    // SINGLE TOUCH START
    const tx=e.touches[0].clientX;
    const ty=e.touches[0].clientY;
    lb.dragStartX=tx; lb.dragStartY=ty;
    lb.dragBaseTx=lb.tx; lb.dragBaseTy=lb.ty;
    lb.dragging=true;
    lb.swipeLocked=false;

    // DOUBLE TAP
    const now=Date.now();
    if(now-lb.lastTap<280){
      e.preventDefault();
      if(lb.scale>1){
        resetLbTransform();
        applyLb(true);
      } else {
        lb.scale=2.5;
        applyLb(true);
      }
    }
    lb.lastTap=now;
  }
},{passive:true});

lbWrap.addEventListener('touchmove',e=>{
  e.preventDefault();

  if(e.touches.length===2 && lb.lastDist!==null){
    // PINCH ZOOM
    const dist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    lb.scale=Math.min(Math.max(lb.baseScale*(dist/lb.lastDist),1),8);
    // don't pan during pinch — keep centered
    lb.tx=0; lb.ty=0;
    applyLb(false);

  } else if(e.touches.length===1 && lb.dragging){
    const dx=e.touches[0].clientX - lb.dragStartX;
    const dy=e.touches[0].clientY - lb.dragStartY;

    if(lb.scale<=1){
      // NOT ZOOMED — allow swipe gesture feedback only (no canvas move)
      // Just give slight resistance visual if needed — we don't move image
      // swipeLocked: determined by dominant direction
      if(!lb.swipeLocked && (Math.abs(dx)>8 || Math.abs(dy)>8)){
        lb.swipeLocked=true;
      }
    } else {
      // ZOOMED — pan the image
      lb.tx = lb.dragBaseTx + dx;
      lb.ty = lb.dragBaseTy + dy;
      clampPan();
      applyLb(false);
    }
  }
},{passive:false});

lbWrap.addEventListener('touchend',e=>{
  if(e.touches.length<2) lb.lastDist=null;

  if(e.touches.length===0 && lb.dragging){
    lb.dragging=false;
    const dx=e.changedTouches[0].clientX - lb.dragStartX;
    const dy=e.changedTouches[0].clientY - lb.dragStartY;

    if(lb.scale<=1){
      // SWIPE LEFT/RIGHT → navigate images
      if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>50){
        if(dx<0) lbGo(lb.cur+1);
        else     lbGo(lb.cur-1);
      }
      // SWIPE DOWN → close
      else if(dy>90 && Math.abs(dx)<60){
        closeLb();
      }
    } else {
      // ZOOMED — snap back if over boundary
      clampPan();
      applyLb(true);
    }
  }
},{passive:true});

// Tap outside → show UI
lbEl.addEventListener('click',e=>{
  if(e.target===lbEl || e.target===lbWrap) showLbUi();
});

// ═══════════════════════════════
//  ENTER KEY SUPPORT
// ═══════════════════════════════
document.getElementById('single-url').addEventListener('keydown',e=>{ if(e.key==='Enter') addSingle(); });
document.getElementById('carousel-url').addEventListener('keydown',e=>{ if(e.key==='Enter') pushCarouselUrl(); });
</script>
